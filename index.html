<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIFO Pantry</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
</head>
<body>

    <div id="app-container">
        <header>
            <h1>Pantry Manager</h1>
            <nav class="location-tabs">
                <button class="tab-btn active" onclick="switchLocation('Fridge')">Fridge</button>
                <button class="tab-btn" onclick="switchLocation('Freezer')">Freezer</button>
                <button class="tab-btn" onclick="switchLocation('Cupboard')">Cupboard</button>
            </nav>
        </header>

        <main id="inventory-list">
            <div class="empty-state">Loading your inventory...</div>
        </main>

        <button id="scan-btn" onclick="openScanner()">
            <span class="icon">+</span>
            <span class="label">Scan Item</span>
        </button>
    </div>

    <div id="scanner-modal" class="modal">
        <div class="modal-content">
            <div id="interactive" class="viewport"></div> <button onclick="closeScanner()" class="close-btn">Cancel</button>
        </div>
    </div>
	
	<div id="details-modal" class="modal">
    <div class="modal-content" style="background: white; padding: 25px; border-radius: 20px; margin: 20% auto; width: 90%;">
        <h2 id="scanned-item-name" style="margin-top: 0;">Add Item</h2>
        
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Expiry Date</label>
        <input type="date" id="expiry-input" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;">

        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Store In</label>
        <select id="location-input" style="width: 100%; padding: 12px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;">
            <option value="Fridge">Fridge</option>
            <option value="Freezer">Freezer</option>
            <option value="Cupboard">Cupboard</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <button onclick="closeDetails()" style="flex: 1; padding: 15px; border: none; border-radius: 10px; background: #eee; font-weight: 600;">Cancel</button>
            <button id="save-batch-btn" style="flex: 2; padding: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: 600;">Add to Inventory</button>
        </div>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
