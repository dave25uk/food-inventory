<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIFO Pantry</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
</head>
<body>

    <div id="app-container">
        <header>
            <h1>Pantry Manager</h1>
            <nav class="location-tabs">
                <button class="tab-btn active" onclick="switchLocation('Fridge')">Fridge</button>
                <button class="tab-btn" onclick="switchLocation('Freezer')">Freezer</button>
                <button class="tab-btn" onclick="switchLocation('Cupboard')">Cupboard</button>
            </nav>
        </header>

        <main id="inventory-list">
		<div class="status-legend">
        <div class="legend-item"><span class="dot expired"></span> Expired</div>
        <div class="legend-item"><span class="dot warning-7"></span> < 7 Days</div>
        <div class="legend-item"><span class="dot warning-30"></span> < 30 Days</div>
    </div>
		
            <div class="empty-state">Loading your inventory...</div>
        </main>

        <button id="scan-btn" onclick="openScanner()">
            <span class="icon">+</span>
            <span class="label">Scan Item</span>
        </button>
    </div>

<div id="scanner-modal" class="modal">
    <div class="modal-content">
        <div id="interactive" class="viewport"></div>
        <div class="scanner-controls">
            <button onclick="addManualItem()" class="manual-btn">No Barcode? Add Manually</button>
            <button onclick="closeScanner()" class="close-btn">Cancel</button>
        </div>
    </div>
</div>
	
<div id="details-modal" class="modal">
    <div class="modal-content">
        <h2 id="scanned-item-name">Add Item</h2>
        
        <div class="form-group">
            <label for="expiry-input">Expiry Date</label>
            <input type="date" id="expiry-input">
        </div>

<div class="form-group">
    <label for="location-input">Store In</label>
    <select id="location-input">
        <option value="Fridge">Fridge</option>
        <option value="Freezer">Freezer</option>
        <option value="Cupboard">Cupboard</option>
    </select>
</div>

<div class="form-group">
    <label for="category-input">Category (Sub-section)</label>
    <select id="category-input">
        <option value="Other">Other</option>
        <option value="Dairy">Dairy</option>
        <option value="Raw Meat">Raw Meat</option>
        <option value="Cooked Meat">Cooked Meat</option>
        <option value="Vegetables">Vegetables</option>
        <option value="Drinks">Drinks</option>
        <option value="Leftovers">Leftovers</option>
    </select>
</div>

        <div class="button-group">
            <button onclick="closeDetails()" class="cancel-btn">Cancel</button>
            <button id="save-batch-btn" class="save-btn">Add to Inventory</button>
        </div>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
